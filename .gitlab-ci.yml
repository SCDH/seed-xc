variables:
  MAVEN_OPTS: >-
    -Dhttps.protocols=TLSv1.2
    -Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository
    -Dorg.slf4j.simpleLogger.showDateTime=true
    -Djava.awt.headless=true
  MAVEN_CLI_OPTS: >-
    --batch-mode
    --errors
    --fail-at-end
    --show-version
    --no-transfer-progress
    -DinstallAtEnd=true
    -DdeployAtEnd=true
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

.release_tag: &release-tag
  rules:
    - if: $CI_COMMIT_TAG =~ /^\d+.\d+.\d+/ # describe how your version tags look like!


cache:
  paths:
    - $CI_PROJECT_DIR/.m2/repository

services:
  - name: docker:dind
    alias: docker
    command: ["--tls=false"]

stages:
  - test
  - build
  - push

# default image: JDK25 with Mandrel Compiler for building native executables
image:
  name: quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-25
  entrypoint:
    - ""

verify:
  stage: test
  script:
    - ./mvnw $MAVEN_CLI_OPTS -Pdownload-openapi generate-sources
    - ./mvnw $MAVEN_CLI_OPTS verify


formatting:
  stage: test
  script:
    - ./mvnw $MAVEN_CLI_OPTS spotless:check

push_packages:
  stage: push
  rules:
    - !reference [ .release_tag, rules ]
  script:
    - ./mvnw -Drevision=$CI_COMMIT_REF_NAME -Dchangelist="" $MAVEN_CLI_OPTS clean
    - ./mvnw -Drevision=$CI_COMMIT_REF_NAME -Dchangelist="" $MAVEN_CLI_OPTS -Pdownload-openapi generate-sources
    - ./mvnw -Drevision=$CI_COMMIT_REF_NAME -Dchangelist="" $MAVEN_CLI_OPTS -Ddistribution.url=$CI_API_V4_URL/projects/$CI_PROJECT_ID/packages/maven -s .gitlab/settings.xml deploy

build_native:
  stage: build
  rules:
    - !reference [ .release_tag, rules ]
  script:
    - ./mvnw -Drevision=$CI_COMMIT_REF_NAME -Dchangelist="" $MAVEN_CLI_OPTS -Pdownload-openapi generate-sources
    - ./mvnw -Drevision=$CI_COMMIT_REF_NAME -Dchangelist="" $MAVEN_CLI_OPTS -Ddts-native -Dquarkus.native.container-build=false install
  artifacts:
    paths:
      - dts/target/*-runner
    expire_in: 1 days

build-container-without-cache:
  stage: push
  needs:
    - verify
    - build_native
  rules:
    - !reference [ .release_tag, rules ]
  image: quay.io/buildah/stable:v1
  tags:
    - privileged
  before_script:
    - buildah version
    - export HOME=$CI_BUILD_DIR
    - buildah login -u gitlab-ci-token -p $CI_JOB_TOKEN $CI_REGISTRY
    #- echo $HARBOR_PASSWORD | buildah login -u $HARBOR_USERNAME --password-stdin $HARBOR_URL
  script:
    ## make container using buildah script
    - dts/buildah_native_micro.sh
    - ctr=$(< buildah-container-id)
    - echo "container ID $ctr"
    ## make image from container and push to harbor registry
    #- img=$(buildah commit $ctr $HARBOR_IMAGE_BUILD)
    #- buildah push $img docker://$HARBOR_IMAGE_BUILD
    # make from container and push to CI registry
    - img=$(buildah commit $ctr $CI_IMAGE_BUILD )
    - buildah push $img docker://$CI_IMAGE_BUILD
  after_script:
    - buildah logout $CI_REGISTRY
    #- buildah logout $HARBOR_REGISTRY
