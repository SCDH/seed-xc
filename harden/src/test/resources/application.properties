# Location for the saxon configuration file. See
# https://www.saxonica.com/documentation10/#!configuration/configuration-file
de.ulbms.scdh.seed.xc.harden.ConfiguredProcessor.saxonConfigLocations = src/test/resources/saxon-config.xml

quarkus.log.level = info
quarkus.log.category."de.ulbms.scdh.seed.xc".level = debug