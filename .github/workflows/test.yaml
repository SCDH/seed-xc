name: Tests
on:
  push:
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'doc'
      - 'samples'
    pull_request:
      branches:
        - main

jobs:
  
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: get required resources
        run: ./mvnw --batch-mode --update-snapshots -Pdownload-openapi generate-sources
          
      - name: run maven verify
        run: ./mvnw --batch-mode --update-snapshots verify
