# Locations where to look up the transformations config file. The
# first found will be used.
de.ulbms.scdh.seed.xc.transformations.ConfiguredTransformationMap.configLocations = src/test/resources/xml-transformer-config.yaml

# Location for the saxon configuration file. See
# https://www.saxonica.com/documentation10/#!configuration/configuration-file
de.ulbms.scdh.seed.xc.xslt.ConfiguredProcessor.saxonConfigLocations = src/test/resources/saxon-config.xml

# Only the file system under this path will be accessible. This is a
# security feature.
de.ulbms.scdh.seed.xc.harden.FileURIResolver.path = .
de.ulbms.scdh.seed.xc.harden.FileURIResolver.baseUri = src/test/resources/

quarkus.log.level = info
quarkus.log.category."de.ulbms.scdh".level = debug