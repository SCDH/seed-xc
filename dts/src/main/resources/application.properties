# Locations where to look up the transformations config file. The
# first found will be used.
de.ulbms.scdh.seed.xc.transformations.ConfiguredTransformationMap.configLocations = ${seed-dts.config}

# Location for the saxon configuration file. See
# https://www.saxonica.com/documentation10/#!configuration/configuration-file
de.ulbms.scdh.seed.xc.saxon.ConfiguredProcessor.saxonConfigLocations = ${seed-dts.saxon-config}

# If this is set to false, then a unknown transformation type given in
# the TransformationInfo entails an exception. If true, the
# transformation is simply not present.
de.ulbms.scdh.seed.xc.transformations.ConfiguredTransformationMap.ignoreInvalidTransformationTypes = false

# Whether URIs without a protocol, i.e. references to the local file
# system are allowed as input to a Saxon transformer. Per default this
# is set to false because allowing them would be a security issue.
de.ulbms.scdh.seed.xc.saxon.harden.ServiceConfiguration.nonProtocolURIsAllowed = false

# Only the file system under this path will be accessible. This is a
# security feature.
de.ulbms.scdh.seed.xc.saxon.harden.FileURIResolver.path = ${seed-dts.accessible-path}
de.ulbms.scdh.seed.xc.saxon.harden.FileURIResolver.baseUri = ${seed-dts.config}

# Mapping of pinned down JSON-LD contexts to local assets
jsonld-context-map = ${seed-dts.jsonld-context-map},${seed-dts.seed-context-map}

# Resource Provider
de.ulbms.scdh.seed.xc.api.ResourceProvider = de.ulbms.scdh.seed.xc.resources.filesystem.FileSystemResourceProvider

de.ulbms.scdh.seed.xc.resources.filesystem.FileSystemResourceProvider.path = ${seed-dts.filesystem}

quarkus.smallrye-openapi.info-title = ${project.name}
quarkus.smallrye-openapi.info-description = Distributed Text Services
#quarkus.smallrye-openapi.info-contact-url = https://github.com/scdh/seed-xc
#quarkus.smallrye-openapi.info-contact-name = by Service Center for Digital Humanities, Münster
quarkus.swagger-ui.footer = This is ${project.name} v${project.version} serving through DTS OpenAPI specs v${dts-openapi.version}, and running DTS Transformations v${dts-transformations.version}.<br/>${project.name} is developed at Service Center for Digital Humanities, Münster. Source code at ${parent.url}

quarkus.log.level = info
quarkus.log.category."de.ulbms.scdh".level = info

# See https://github.com/quarkusio/quarkus/issues/33541
quarkus.log.console.darken=1

# Use the maven property in the native build profile in service/pom.xml instead!
# quarkus.native.additional-build-args=--initialize-at-run-time=org.apache.hc.client5.http.impl.auth.NTLMEngineImpl


# https://quarkus.io/guides/http-reference#cors-filter
quarkus.http.cors=true
%dev.quarkus.http.cors.origins=/.*/